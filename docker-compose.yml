version: '3.8'
services:
  backend:
    build: 
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chat.db:/app/chat.db  # Чтобы база не удалялась при перезагрузке
      - ./backend/uploads:/app/uploads  # Папка для фото/видео из ТЗ
    restart: always
